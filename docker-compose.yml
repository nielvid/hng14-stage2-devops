services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "${REDIS_CPU_LIMIT:-0.25}"
          memory: "${REDIS_MEM_LIMIT:-128m}"

  api:
    build: ./api
    restart: unless-stopped
    networks:
      - internal
    environment:
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "${API_CPU_LIMIT:-0.50}"
          memory: "${API_MEM_LIMIT:-256m}"

  worker:
    build: ./worker
    restart: unless-stopped
    networks:
      - internal
    environment:
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "${WORKER_CPU_LIMIT:-0.50}"
          memory: "${WORKER_MEM_LIMIT:-256m}"

  frontend:
    build: ./frontend
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      API_URL: "${API_URL:-http://api:8000}"
      APP_PORT: "3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "${FRONTEND_CPU_LIMIT:-0.50}"
          memory: "${FRONTEND_MEM_LIMIT:-256m}"

networks:
  internal:
    driver: bridge
